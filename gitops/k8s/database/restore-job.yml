apiVersion: batch/v1
kind: Job
metadata:
  name: boutique-db-restore
  namespace: boutique
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: restore
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for Postgres..."
              until pg_isready -h boutique-postgres -U postgres; do
                sleep 2
              done

              echo "Restoring dump..."
              psql -h boutique-postgres -U postgres -f /dump/boutique_full.sql

              echo "Creating auth_db schema..."
              psql -h boutique-postgres -U postgres -d auth_db -c "
              CREATE TABLE IF NOT EXISTS users (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                email VARCHAR(255) UNIQUE NOT NULL,
                password_hash VARCHAR(255) NOT NULL,
                first_name VARCHAR(100),
                last_name VARCHAR(100),
                role VARCHAR(50) DEFAULT 'customer',
                created_at TIMESTAMP DEFAULT NOW(),
                updated_at TIMESTAMP DEFAULT NOW()
              );"

              echo "Restore completed."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: dump
              mountPath: /dump
      volumes:
        - name: dump
          configMap:
            name: boutique-db-dump
